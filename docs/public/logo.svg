<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="ra" x1="40" y1="256" x2="460" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset=".5" stop-color="#312e81"/>
      <stop offset="1" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="rb" x1="52" y1="256" x2="472" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset=".5" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a5b4fc"/>
    </linearGradient>
  </defs>
  <!--
    Two tapered, aerodynamic lens forms crossing at the center.
    Form A sweeps lower, bulges upward.
    Form B sweeps upper, bulges downward.
    They overlap in the center — the relay nexus.
  -->
  <path d="M 40,314 Q 250,172 460,288 Q 250,432 40,314 Z" fill="url(#ra)"/>
  <path d="M 52,198 Q 262,340 472,224 Q 262,80  52,198 Z" fill="url(#rb)"/>
</svg>
